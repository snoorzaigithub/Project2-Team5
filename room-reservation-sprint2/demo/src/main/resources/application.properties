spring.application.name=demo
spring.profiles.default=h2

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8081


resilience4j.circuitbreaker.instances.roomManager.sliding-window-size=10
resilience4j.circuitbreaker.instances.roomManager.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.roomManager.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.roomManager.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.roomManager.automatic-transition-from-open-to-half-open-enabled=true

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health,circuitbreakers
