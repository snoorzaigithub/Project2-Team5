server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: reservation-access
  datasource:
    url: jdbc:postgresql://postgres:5432/db
    username: postgres
    password: password
  config:
    import: optional:configserver:http://config-service:8888
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring.lifecycle:
  timeout-per-shutdown-phase: 20s
