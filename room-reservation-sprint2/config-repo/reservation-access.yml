server:
  port: 8080

spring:
  application:
    name: reservation-access
  datasource:
    url: jdbc:postgresql://postgres:5432/db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
