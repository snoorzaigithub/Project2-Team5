<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rooms</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080808;
            --surface: #0e0e0e;
            --surface2: #141414;
            --ink: #f0ece4;
            --ink-muted: #6b6357;
            --accent: #c82a2a;
            --accent-soft: rgba(200,42,42,0.07);
            --accent-glow: rgba(200,42,42,0.18);
            --border: #222;
            --border-bright: #333;
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        body {
            background: var(--bg);
            background-image: var(--grain);
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                transparent, transparent 31px,
                rgba(240,236,228,0.025) 31px,
                rgba(240,236,228,0.025) 32px
            );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 800px; height: 400px;
            background: radial-gradient(ellipse at top, rgba(200,42,42,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 3rem 4rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .header-left .ornament {
            display: block;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 0.4em;
            margin-bottom: 0.6rem;
            opacity: 0.8;
        }

        .header-left h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            font-weight: 300;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }

        .header-left h1 span {
            color: var(--accent);
        }

        .datetime {
            text-align: right;
            font-size: 0.82rem;
            color: var(--ink-muted);
            letter-spacing: 0.06em;
            font-style: italic;
            line-height: 1.7;
        }

        .datetime #clock {
            display: block;
            font-size: 1.5rem;
            font-style: normal;
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            color: var(--ink);
            letter-spacing: 0.08em;
        }

        /* ── Grid ── */
        main {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 3rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Room Card ── */
        .room-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem 2rem 1.5rem;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 2px; height: 50px;
            background: var(--accent);
            transition: height 0.2s;
        }

        .room-card:hover {
            border-color: var(--border-bright);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--accent-glow);
            transform: translateY(-3px);
        }

        .room-card:hover::before { height: 100%; }

        @keyframes rise {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .room-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 1.1rem;
        }

        .room-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.35rem;
            font-weight: 400;
            letter-spacing: 0.04em;
            line-height: 1.2;
        }

        .room-meta {
            font-size: 0.8rem;
            color: var(--ink-muted);
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
            font-style: italic;
        }

        /* ── Three-dot menu ── */
        .menu-wrap {
            position: relative;
        }

        .dots-btn {
            background: none;
            border: none;
            color: var(--ink-muted);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0.2rem 0.5rem;
            letter-spacing: 0.05em;
            line-height: 1;
            transition: color 0.15s;
            z-index: 10;
        }

        .dots-btn:hover { color: var(--ink); }

        .dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--surface2);
            border: 1px solid var(--border-bright);
            min-width: 130px;
            z-index: 100;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
        }

        .dropdown.open { display: block; }

        .dropdown button,
        .dropdown form button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            color: var(--ink);
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.75rem 1.1rem;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .dropdown button:hover { background: var(--accent-soft); color: var(--accent); }

        .divider-line {
            width: 32px; height: 1px;
            background: var(--accent);
            margin-bottom: 1rem;
        }

        /* ── Feature pills ── */
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 1rem;
        }

        .feature-pill {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            border: 1px solid var(--border-bright);
            padding: 0.25rem 0.6rem;
            border-radius: 2px;
        }

        .feature-pill.active {
            color: var(--accent);
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        /* ── Empty state ── */
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 6rem 0;
            color: var(--ink-muted);
            font-style: italic;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
        <h1>Reserve a <span>Room</span></h1>
    </div>
    <div class="datetime">
        <span id="clock">--:--:--</span>
        <span id="date-label"></span>
    </div>
</header>

<main>
    <div class="empty" th:if="${#lists.isEmpty(rooms)}">No rooms are currently available.</div>

    <div class="room-card" th:each="room, iterStat : ${rooms}"
         th:style="'animation-delay:' + ${iterStat.index * 60} + 'ms'"
         onclick="window.location='/rooms/__${room.id}__'">

        <div class="room-card-header">
            <div>
                <div class="room-name" th:text="${room.name}">Room Name</div>
                <div class="room-meta">Capacity: <span th:text="${room.capacity}">0</span></div>
            </div>
            <!-- Stop click bubbling so the card link doesn't fire -->
            <div class="menu-wrap" onclick="event.stopPropagation()">
                <button class="dots-btn" onclick="toggleMenu(this)">•••</button>
                <div class="dropdown">
                    <form th:action="@{/rooms/{id}/reserved(id=${room.id})}" method="post"
                          onclick="event.stopPropagation()">
                        <button type="submit">Reserve</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="divider-line"></div>

        <!-- Features — iterate over all features, show only those belonging to this room -->
        <div class="features">
            <th:block th:each="feature : ${features}" th:if="${feature.roomId == room.id}">
                <span class="feature-pill active" th:if="${feature.wifi}"       >WiFi</span>
                <span class="feature-pill active" th:if="${feature.projector}"  >Projector</span>
                <span class="feature-pill active" th:if="${feature.whiteboard}" >Whiteboard</span>
                <span class="feature-pill active" th:if="${feature.ac}"         >A/C</span>
                <!-- add more feature fields here as needed -->
            </th:block>
        </div>
    </div>
</main>

<script>
    // Clock
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('date-label').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Three-dot dropdown
    function toggleMenu(btn) {
        const dropdown = btn.nextElementSibling;
        const isOpen = dropdown.classList.contains('open');
        document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
        if (!isOpen) dropdown.classList.add('open');
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    });
</script>
</body>
</html>
